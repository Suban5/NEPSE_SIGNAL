name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: UI module compile checks
        run: |
          python -m py_compile ui/app.py ui/api_client.py ui/components/*.py ui/utils/*.py

      - name: UI contract drift check
        run: |
          pytest -q tests/ui/test_ui_contract_drift.py

      - name: Run tests with coverage gate
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=term-missing \
            --cov-fail-under=90

      - name: Build UI Docker image
        run: |
          docker build -f Dockerfile.ui -t nepsesignal-ui:test .
